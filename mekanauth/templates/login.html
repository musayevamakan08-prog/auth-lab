    <!DOCTYPE html>
<html lang="az">

<head>

    <meta charset="UTF-8">

    <title>Authentication Failure Lab</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
        }

        .box{
            width:320px;
            background:white;
            margin:100px auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        .msg{
            margin-top:15px;
            color:red;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Login System</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="msg">
        {{ message }}
    </div>

</div>

</body>
</html>
